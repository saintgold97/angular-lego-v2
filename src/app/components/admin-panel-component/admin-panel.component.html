<header class="admin-activities-header animate__fadeIn">
  <h2 class="admin-activities-title display-6 fw-bold mb-2"><i class="bi bi-people-fill me-2"></i>Users Management</h2>
  <div class="export-container">
    <app-filter
      [hideUserFilter]="true"
      [hideProjectFilter]="true"
      [hideDateFilter]="true"
      (filterChanged)="updateFilters($event)"
    />
    <app-export-data
      [dataCount]="(allProfiles$ | async)?.length || 0"
      [isExporting]="loadingExport"
      (onConfirm)="handleExport($event)"
    />
  </div>
</header>

<section class="admin-section animate__fadeIn">
  <div class="row justify-content-center">
    <div class="col-lg-10">
      <div class="card admin-card glass p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <span class="badge bg-dark">Admin Panel</span>
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th>User</th>
                <th>Email</th>
                <th>Role</th>
                <th class="text-end">Change role</th>
              </tr>
            </thead>
            <tbody>
              @for (profile of allProfiles$ | async; track profile.id) {
              <tr>
                <td>
                  <img
                    [src]="profile.avatar_url || defaultAvatar"
                    class="rounded-circle me-2"
                    width="35"
                    height="35"
                    alt=""
                  />
                </td>
                <td>{{ profile.email }}</td>
                <td>
                  <span class="small fw-bold">{{ profile.role }}</span>
                </td>
                <td class="text-end">
                  <select
                    class="form-select form-select-sm d-inline-block w-auto"
                    (change)="changeUserRole(profile.id, $event)"
                  >
                    <option [selected]="profile.role === roles.USER" [value]="roles.USER">
                      {{ roles.USER }}
                    </option>
                    <option
                      [selected]="profile.role === roles.SUPERVISOR"
                      [value]="roles.SUPERVISOR"
                    >
                      {{ roles.SUPERVISOR }}
                    </option>
                    <option [selected]="profile.role === roles.ADMIN" [value]="roles.ADMIN">
                      {{ roles.ADMIN }}
                    </option>
                  </select>
                </td>
              </tr>
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</section>
