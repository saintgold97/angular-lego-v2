<header class="admin-activities-header animate__fadeIn">
  <h2 class="admin-activities-title display-6 fw-bold mb-2">Monitoring Activities</h2>
  <p class="text-muted">
    <i class="bi bi-info-circle me-2"></i>
    Log of all activities
  </p>

  <app-filter (filterChanged)="updateFilters($event)" />

  <div class="switch-container mt-3">
    <span class="switch-label" id="switch-label">Switch View: </span>
    <button
      type="button"
      class="view-switcher-btn"
      [class.active]="switchSection"
      (click)="handleSwitchSection()"
      role="switch"
      [attr.aria-checked]="switchSection"
      aria-labelledby="switch-label"
    >
      <span class="switch-track">
        <span class="switch-thumb">
          <i class="bi" [ngClass]="switchSection ? 'bi-card-list' : 'bi-table'"></i>
        </span>

        <span class="switch-labels">
          <span class="label-text" [class.hidden]="!switchSection">List</span>
          <span class="label-text" [class.hidden]="switchSection">Table</span>
        </span>
      </span>
    </button>
  </div>
</header>

@if(switchSection) {
  <app-activities-list [activities]="activities$ | async" [hideButtons]="true" />
} @else {
<section class="admin-activities-section p-4 animate__fadeIn">
  <app-activities-table [activities]="activities$ | async" [hideButtons]="true" />
</section>
}
