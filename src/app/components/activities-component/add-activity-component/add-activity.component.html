<div class="card glass p-4 shadow-sm">
    <h3 class="h5 mb-4"><i class="bi bi-plus-circle me-2"></i>Add New Activity</h3>

    <form [formGroup]="activitiesForm" (ngSubmit)="onActivitySubmit()">
      <div class="mb-3">
        <label class="form-label">Project</label>
        <select class="form-select border-0 bg-light" formControlName="project_id">
          <option value="">Select Project...</option>
          @for (project of projects$ | async; track project.id) {
          <option [value]="project.id">{{ project.name }}</option>
          }
        </select>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Type</label>
          <select class="form-select border-0 bg-light" formControlName="activity_type">
            @for (type of activityTypes; track type) {
            <option [value]="type">{{ type | titlecase }}</option>
            }
          </select>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Priority</label>
          <select class="form-select border-0 bg-light" formControlName="priority">
            @for (priority of priorities; track priority) {
            <option [value]="priority">{{ priority | titlecase }}</option>
            }
          </select>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Date</label>
          <input
            type="date"
            class="form-control border-0 bg-light"
            formControlName="activity_date"
          />
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Working Hours</label>
          <input
            type="number"
            class="form-control border-0 bg-light"
            formControlName="working_hours"
            min="0"
            step="0.5"
            placeholder="e.g., 1.5"
          />
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label">Notes</label>
        <textarea
          class="form-control border-0 bg-light"
          rows="3"
          formControlName="notes"
          placeholder="What happened?"
        ></textarea>
      </div>

      <button
        type="submit"
        class="btn btn-warning w-100 fw-bold"
        [disabled]="activitiesForm.invalid || uploading"
      >
        @if (uploading) { <span class="spinner-border spinner-border-sm me-2"></span> } Post
        Activity
      </button>
    </form>

    @if (successMessage) {
    <div class="alert alert-success mt-3 border-0">{{ successMessage }}</div>
    } @if (errorMessage) {
    <div class="alert alert-danger mt-3 border-0">{{ errorMessage }}</div>
    }
  </div>
