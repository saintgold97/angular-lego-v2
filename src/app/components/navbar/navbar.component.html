<nav class="navbar navbar-expand-lg" [class.navbar-fixed]="isFixed">
  <div class="container-fluid">
    <a class="navbar-brand" [routerLink]="['/home']"
      ><img
        style="width: 60px; height: 60px"
        [src]="imgLegoLogo"
        alt="Lego Logo"
    /></a>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNavAltMarkup"
      aria-controls="navbarNavAltMarkup"
      [aria-expanded]="isMenuOpen"
      aria-label="Toggle navigation"
      (click)="toggleMenu()"
    >
      <i class="bi" [ngClass]="isMenuOpen ? 'bi-x-lg' : 'bi-list'" style="font-size: 1.5rem"></i>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
      <div class="navbar-nav">
        <div class="nav-list-links">
          <a class="nav-link active" aria-current="page"[routerLink]="['/home']">Home</a>
          <a class="nav-link" [routerLink]="['/characters']">Characters</a>
          <a class="nav-link" [routerLink]="['/projects']">Projects</a>
          <a class="nav-link" [routerLink]="['/activities']">Activities</a>
        </div>
        <div class="nav-user">
          @if (userData | async; as data) {
              <a  class="nav-link" [routerLink]="['/dashboard']">
                <img
                  [src]="data.avatar_url"
                  class="profile-img"
                />
              </a>
          } @else {
              <div class="spinner-border text-warning" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
          }
          <button class="btn btn-danger" (click)="signOutHandler()">
            <i class="bi bi-box-arrow-right btnSignOut"></i>Logout
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
