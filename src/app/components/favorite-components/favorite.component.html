<section class="section-favorites">
  <div class="favorites-header text-center mb-5">
    <h2>Your Favorite Characters</h2>
    <p>Browse through your collection of favorite LEGO characters!</p>
  </div>
  @if(favorites) {
  <div class="favorites-container">
    <div class="container">
      <div class="row justify-content-center">
        @for (favorite of (favorites | async); track favorite.id) {
        <div class="col-10 col-md-5 col-lg-4">
          <div class="card-content">
            <app-single-character
              [character]="favorite"
              [showRemoveButton]="true"
              [showDetailButton]="true"
              (onRemove)="toggleFavorite($event)"
            ></app-single-character>
          </div>
        </div>
        } @empty {
        <div class="card container favorite-empty col-10 col-md-6 mt-5">
          <img
            [src]="imgEmptyFavorites"
            alt="Empty"
          />
        </div>
        }
      </div>
    </div>
  </div>
  } @else {
  <div class="d-flex justify-content-center mt-5">
    <div class="spinner-border text-warning" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
  }
</section>
